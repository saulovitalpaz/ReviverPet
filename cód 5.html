<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>PetDriver GV</title>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <div class="max-w-md mx-auto p-6">
        <div class="mb-8">
            <h2 class="text-3xl font-light">Para onde <span class="font-bold text-blue-400">vamos?</span></h2>
            <p class="text-slate-400 text-sm">Transporte especializado em Governador Valadares.</p>
        </div>

        <div class="w-full h-64 bg-slate-800 rounded-3xl mb-8 flex items-center justify-center border border-slate-700 relative overflow-hidden">
            <div class="absolute inset-0 bg-[url('https://www.google.com/maps/about/images/mymaps/mymaps-desktop-16x9.png')] opacity-30 bg-cover"></div>
            <div class="z-10 bg-white text-slate-900 px-4 py-2 rounded-full font-bold shadow-2xl">GV - Centro 📍</div>
        </div>

        <div class="space-y-4">
            <div class="bg-slate-800 p-4 rounded-2xl border border-blue-500/30 flex justify-between items-center cursor-pointer hover:bg-slate-700">
                <div>
                    <h4 class="font-bold">Comfort Pet</h4>
                    <p class="text-xs text-slate-400">Capa de couro & Ar-condicionado</p>
                </div>
                <span class="text-blue-400 font-bold">R$ 18,50</span>
            </div>

            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 flex justify-between items-center opacity-60">
                <div>
                    <h4 class="font-bold">Multi Pet (Até 3 animais)</h4>
                    <p class="text-xs text-slate-400">Cintos triplos de segurança</p>
                </div>
                <span class="text-slate-400 font-bold">R$ 25,00</span>
            </div>
        </div>

        <button class="w-full bg-blue-500 hover:bg-blue-600 text-white font-black py-5 rounded-3xl mt-10 shadow-lg shadow-blue-500/20 transition-all uppercase tracking-widest">
            Confirmar PetDriver
        </button>
        
        <p class="text-center mt-6 text-xs text-slate-500">Motoristas treinados para manejo e higiene pós-viagem.</p>
    </div>
</body>
</html>

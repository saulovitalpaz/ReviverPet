<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EliFerraz Designs - Pet Care & Mobility</title>
    <style>
        :root {
            --primary-color: #2c3e50; /* Tons sugeridos para o branding */
            --accent-color: #27ae60;
            --bg-light: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-light); margin: 0; }
        header { background: var(--primary-color); color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-mode { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-passeio { background: var(--accent-color); color: white; }
        .btn-driver { background: #2980b9; color: white; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <h1>EliFerraz Designs</h1>
    <p>Cuidado e Mobilidade Pet em Gov. Valadares</p>
</header>

<div class="container">
    <div class="mode-selector">
        <button class="btn-mode btn-passeio">Buscar Passeio</button>
        <button class="btn-mode btn-driver">Chamar PetDriver (GV)</button>
    </div>

    <div id="content">
        <div class="card">
            <h3>Passeador: Michael (Enf. Veterinário)</h3>
            <p>Especialista em hotelzinho e passeios terapêuticos.</p>
            <p><strong>Valor: R$ 30,00 / passeio</strong></p>
            <button>Solicitar Agora</button>
        </div>
    </div>
</div>

</body>
</html>

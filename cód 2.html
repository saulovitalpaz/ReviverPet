<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Pet - Ana Elisa Ferraz</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; color: #333; line-height: 1.6; margin: 0; background: #fafafa; }
        .hero { background: #6c5ce7; color: white; padding: 40px 20px; text-align: center; }
        .nav-tabs { display: flex; justify-content: center; background: white; border-bottom: 2px solid #eee; }
        .tab { padding: 15px 25px; cursor: pointer; font-weight: bold; color: #777; transition: 0.3s; }
        .tab.active { color: #6c5ce7; border-bottom: 3px solid #6c5ce7; }
        .content { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .card-pet { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; }
        .price-tag { background: #e1f5fe; color: #0288d1; padding: 5px 12px; border-radius: 20px; font-size: 0.9em; font-weight: bold; }
        .btn-main { background: #00b894; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 1em; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Ana Elisa Ferraz</h1>
    <p>Inovação em Cuidado e Logística Pet</p>
</div>

<div class="nav-tabs">
    <div class="tab active">Passeios</div>
    <div class="tab">PetDriver GV</div>
    <div class="tab">Mensalidades</div>
</div>

<div class="content">
    <div class="card-pet">
        <div style="flex-grow: 1;">
            <h3>Passeio Terapêutico com Michael</h3>
            <p>Enfermeiro Veterinário com experiência em hotelzinho e cuidados específicos.</p>
            <span class="price-tag">R$ 30,00 / sessão</span>
        </div>
        <button class="btn-main">Agendar</button>
    </div>
</div>

</body>
</html>

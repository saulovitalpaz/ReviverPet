<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Buscar Passeadores - GV</title>
</head>
<body class="bg-emerald-50/30">
    <div class="max-w-4xl mx-auto p-6">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold text-emerald-900">Encontre o parceiro ideal</h2>
            <div class="flex gap-2">
                <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold uppercase">Disponíveis Hoje</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-sm border border-emerald-100 flex flex-col md:flex-row gap-6 mb-4">
            <div class="w-24 h-24 bg-gray-200 rounded-full flex-shrink-0 overflow-hidden border-4 border-white shadow-md">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Michael" alt="Michael">
            </div>
            <div class="flex-grow">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800">Michael S.</h3>
                        <p class="text-emerald-600 font-medium text-sm">Enfermeiro Veterinário & Passeador</p>
                    </div>
                    <div class="text-right text-sm text-gray-400">
                        ⭐ 5.0 (42 avaliações)
                    </div>
                </div>
                <p class="mt-3 text-gray-600 text-sm">Especialista em manejo de cães idosos e hotelzinho. Atende centro e bairros próximos em GV.</p>
                <div class="mt-4 flex gap-2">
                    <span class="bg-slate-100 px-2 py-1 rounded text-xs text-slate-500 font-semibold">Seguro Veterinário Incluído</span>
                    <span class="bg-slate-100 px-2 py-1 rounded text-xs text-slate-500 font-semibold">Fotos em Tempo Real</span>
                </div>
            </div>
            <div class="flex flex-col justify-center items-center gap-2 border-l pl-6 border-emerald-50">
                <span class="text-2xl font-bold text-slate-800">R$ 30,00</span>
                <button class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded-xl transition-all">Reservar</button>
            </div>
        </div>
    </div>
</body>
</html>
